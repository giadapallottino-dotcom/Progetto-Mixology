<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mixology Lounge - Cocktail Database</title>
    <meta name="description" content="Esplora il database di Mixology Lounge. Trova le ricette dei tuoi cocktail preferiti, filtra per ingredienti, gusto o difficoltà e diventa un barman perfetto.">
    <link rel="stylesheet" href="assets/fonts/PlayfairDisplay/stylesheets.css">
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>

    <header class="header">
        <a href="index.html" class="logo">  
            <img src="assets/images/logo.png" alt="Mixology Lounge Logo">
            <span>Mixology Lounge</span>
        </a>
        <label for="cerca-cocktail" class="filter-label"></label>
        <input type="text" id="cerca-cocktail" class="cerca-cocktail" placeholder="Cerca cocktail...">
        <button id="apri-filtri" class="apri-filtri">Filtra</button>
    </header>

    <div class="main-layout">

        <aside id="sidebar" class="sidebar">

            <button id="chiudi-filtri" class="chiudi-filtri">✕</button>

            <div class="box-ingrediente-flex">
                <label for="cerca-ingrediente" class="filter-label">Cerca ingrediente</label>
                <div class="input-piu-container">
                    <input type="text" id="cerca-ingrediente" class="cerca-ingrediente" placeholder="es. lime, gin, menta...">
                    <button id="aggiungi-ingrediente" class="bottone-piu">+</button>
                </div>
            </div>

            <div class="box-filtri">
                <div id="filtri-attivi" class="filtri-attivi"></div>
            </div>

            <div class="box-tipo">
                <label class="filter-label">Tipo</label>
                <div class="bottoni-tipo-container">
                    <button id="bottone-alcolici" class="bottone-alcolici">Alcolici</button>
                    <button id="bottone-analcolici" class="bottone-analcolici">Analcolici</button>
                </div>
            </div>

            <div class="box-difficolta">
                <label for="seleziona-difficolta" class="filter-label">Difficoltà</label>
                <select id="seleziona-difficolta" class="seleziona-difficolta">
                    <option value="">Tutte</option>
                    <option value="Facile">Facile</option>
                    <option value="Media">Media</option>
                    <option value="Difficile">Difficile</option>
                </select>
            </div>

            <div class="box-gusto">
                <label for="seleziona-gusto" class="filter-label">Gusto</label>
                <select id="seleziona-gusto" class="seleziona-gusto">
                    <option value="">Tutti</option>
                    <option value="Secco">Secco</option>
                    <option value="Sapido">Sapido</option>
                    <option value="Agrumato">Agrumato</option>
                    <option value="Dolce">Dolce</option>
                    <option value="Fruttato">Fruttato</option>
                    <option value="Speziato">Speziato</option>
                    <option value="Erbaceo">Erbaceo</option>
                    <option value="Amaro">Amaro</option>
                    <option value="Floreale">Floreale</option>
                </select>
            </div>
            
            <button id="pulisci-filtri" class="pulisci-filtri">Pulisci filtri</button>

            <button id="mostra-risultati" class="mostra-risultati-mobile">Mostra risultati</button>  

        </aside>

        <main id="contenuto" class="main-content">
            <h2 id="titolo-pagina">I Nostri Cocktail</h2>
            <div id="griglia-cocktail" class="griglia-cocktail"></div>
        </main>

        </div> <footer class="footer-sito">
        <div class="footer-minimo">
            <span class="logo-footer">Mixology Lounge</span>
            <span class="separatore-footer">|</span>
            <span class="footer-copyright">&copy; 2026 Tutti i diritti riservati.</span>
        </div>
    </footer>

    </div> 
    
    <div id="finestra-ricetta" class="finestra-ricetta">
        <div id="contenuto-finestra" class="contenuto-finestra">
            <button id="chiudi-finestra">✕</button>
            <img id="foto-cocktail" src="" alt="">
            <div id="info-cocktail" class="info-cocktail">
                <h2 id="titolo-cocktail">Cocktail</h2>
                <div class="caratteristiche-cocktail">
                    <span class="info-selezione"><strong>Difficoltà:</strong> <span id="difficolta-cocktail"></span></span>
                    <span class="info-selezione"><strong>Gusto:</strong> <span id="gusto-cocktail"></span></span>
                    <span class="info-selezione"><strong>Tipo:</strong> <span id="tipo-cocktail"></span></span>
                </div>
                <h3>Ingredienti</h3>
                <ul id="lista-ingredienti"></ul>
                <h3>Preparazione</h3>
                <p id="testo-preparazione"></p>
            </div>
        </div>
    </div>

    <script src="assets/js/cocktails.js"></script>
    <script src="assets/js/app.js"></script>

</body>
</html>
