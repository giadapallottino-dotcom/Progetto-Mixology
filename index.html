<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mixology Lounge - Cocktail Database</title>
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

    <header class="header">
        <a href="index.html" class="logo">  
            <img src="assets/images/logo.png" alt="Mixology Lounge Logo">
            <span>Mixology Lounge</span>
        </a>
        <input type="text" id="cerca-cocktail" class="cerca-cocktail" placeholder="Cerca cocktail...">
    </header>

    <div class="main-layout">

        <aside class="sidebar">
    
            <div class="box-filtri">
                <div id="filtri-attivi" class="filtri-attivi"></div>
                <button id="pulisci-filtri" class="pulisci-filtri">Pulisci filtri</button>
            </div>

            <div class="box-ingrediente-flex">
                <label class="filter-label">Cerca ingrediente</label>
                <div class="input-piu-container">
                    <input type="text" id="cerca-ingrediente" class="cerca-ingrediente" placeholder="es. lime, gin, menta...">
                    <button id="aggiungi-ingrediente" class="bottone-piu">+</button>
                </div>
            </div>

            <div class="box-tipo">
                <label class="filter-label">Tipo</label>
                <div class="bottoni-tipo-container">
                    <button id="bottone-alcolici" class="bottone-alcolici">Alcolici</button>
                    <button id="bottone-analcolici" class="bottone-analcolici">Analcolici</button>
                </div>
            </div>

            <div class="box-difficolta">
                <label class="filter-label">Difficoltà</label>
                <select id="seleziona-difficolta" class="seleziona-difficolta">
                    <option value="">Tutte</option>
                    <option value="Facile">Facile</option>
                    <option value="Media">Media</option>
                    <option value="Difficile">Difficile</option>
                </select>
            </div>

            <div class="box-gusto">
                <label class="filter-label">Gusto</label>
                <select id="seleziona-gusto" class="seleziona-gusto">
                    <option value="">Tutti</option>
                    <option value="secco">Secco</option>
                    <option value="sapido">Sapido</option>
                    <option value="agrumato">Agrumato</option>
                    <option value="dolce">Dolce</option>
                    <option value="fruttato">Fruttato</option>
                    <option value="speziato">Speziato</option>
                    <option value="erbaceo">Erbaceo</option>
                    <option value="amaro">Amaro</option>
                    <option value="floreale">Floreale</option>
                </select>
            </div>
        </aside>

        <main id="contenuto" class="main-content">
            <h2 id="titolo-pagina">I Nostri Cocktail</h2>
            <div id="griglia-cocktail" class="griglia-cocktail"></div>
        </main>

    </div> 
    
    <div id="finestra-ricetta" class="finestra-ricetta">
        <div id="contenuto-finestra" class="contenuto-finestra">
            <button id="chiudi-finestra">x</button>
            <img id="foto-cocktail" src="" alt="">
            <div id="info-cocktail" class="info-cocktail">
                <h2 id="titolo-cocktail"></h2>
                <h3>Ingredienti</h3>
                <ul id="lista-ingredienti"></ul>
                <h3>Preparazione</h3>
                <p id="testo-preparazione"></p>
            </div>
        </div>
    </div>

    <script src="assets/js/cocktails.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
